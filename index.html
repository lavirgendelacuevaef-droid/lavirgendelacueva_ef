    <style>
        /* --- ESTILOS GENERALES --- */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #333;
            
            /* IMPORTANTE: AQUÍ CAMBIAS LA FOTO DE LA VIRGEN.
               Busca tu foto de la "Virgen con paraguas", guárdala en la carpeta
               con el nombre 'fondo_virgen.jpg' y se verá aquí.
            */
            background-image: url('fondo_virgen.jpg'); 
            
            /* Si no tienes la foto aún, usa esta línea de abajo temporalmente (borra las // del principio): */

            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- CAPA DE LLUVIA (IMAGEN GIF) --- */
        .rain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Dejamos hacer clic a través de la lluvia */
            z-index: 1;
            /* Esta es una imagen de lluvia en movimiento transparente */
            background-image: url('https://i.gifer.com/7scx.gif'); 
            background-size: cover;
            opacity: 0.4; /* Ajusta este número (0.1 a 1) para que se vea más o menos la virgen */
            mix-blend-mode: screen; /* Esto hace que se vea mejor sobre fotos oscuras */
        }

        /* Contenedor principal */
        .content-wrapper {
            position: relative;
            z-index: 2; /* Encima de la lluvia */
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            min-height: 100vh;
            /* Un poco de sombra negra para que el texto resalte sobre la virgen */
            background: rgba(0,0,0,0.3); 
        }

        /* --- CABECERA --- */
        header {
            margin-top: 40px;
            margin-bottom: 50px;
            text-align: center;
            background: rgba(255, 111, 97, 0.9); /* Color coral casi sólido */
            padding: 20px 50px;
            border-radius: 50px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            border: 4px solid #fff;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: #fff;
            font-size: 3.5rem;
            margin: 0;
            text-shadow: 3px 3px 0px #000;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- MENÚ DE TARJETAS --- */
        .menu-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 1200px;
            padding: 20px;
        }

        .menu-item {
            text-decoration: none;
            background: #fff;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: transform 0.2s;
            text-align: center;
            width: 190px;
            border: 4px solid #fff;
        }

        .menu-item:hover {
            transform: scale(1.1); /* Efecto zoom */
            border-color: #ffcc00;
            z-index: 10;
        }

        .menu-item img {
            width: 100%;
            height: 150px;
            object-fit: contain; /* Esto asegura que se vea TODO el tablero/figura sin recortar */
            border-radius: 10px;
            margin-bottom: 10px;
            background-color: #f0f0f0; /* Fondo grisito suave detrás de la imagen */
        }

        .menu-item span {
            display: block;
            color: #d35400;
            font-weight: bold;
            font-size: 1.2rem;
            font-family: 'Fredoka One', cursive;
        }

    </style>
